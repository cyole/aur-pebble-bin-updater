name: Update AUR Package

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check for updates and generate PKGBUILD
        id: check
        run: |
          set -euo pipefail

          curl_json() {
            curl -fsSL --connect-timeout 20 --max-time 120 --retry 3 --retry-delay 5 "$@"
          }

          echo "::group::Checking for updates"

          current_pkgver="$(grep -E '^pkgver=' PKGBUILD | cut -d'=' -f2)"
          current_pkgrel="$(grep -E '^pkgrel=' PKGBUILD | cut -d'=' -f2)"
          current_version="${current_pkgver}-${current_pkgrel}"
          echo "Local version: ${current_version}"

          aur_response="$(curl_json 'https://aur.archlinux.org/rpc/?v=5&type=info&arg[]=pebble-bin' || true)"
          aur_resultcount=0
          aur_version=""
          if [ -n "${aur_response}" ]; then
            aur_resultcount="$(echo "${aur_response}" | jq -r '.resultcount // 0')"
            if [ "${aur_resultcount}" != "0" ]; then
              aur_version="$(echo "${aur_response}" | jq -r '.results[0].Version // empty')"
            fi
          fi
          echo "AUR version: ${aur_version:-unknown}"

          release_json="$(curl_json -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${{ github.token }}" \
            'https://api.github.com/repos/QingJ01/Pebble/releases/latest')"

          new_tag="$(echo "${release_json}" | jq -r '.tag_name')"
          if [[ ! "${new_tag}" =~ ^v[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "ERROR: latest release tag must look like vMAJOR.MINOR.PATCH, got '${new_tag}'"
            exit 1
          fi

          new_pkgver="${new_tag#v}"
          if [ "${current_pkgver}" = "${new_pkgver}" ]; then
            new_pkgrel="${current_pkgrel}"
          else
            new_pkgrel=1
          fi
          new_version="${new_pkgver}-${new_pkgrel}"
          appimage="Pebble_${new_pkgver}_amd64.AppImage"
          checksum_asset="${appimage}.sha256"
          checksum_url="$(echo "${release_json}" | jq -r --arg name "${checksum_asset}" '.assets[] | select(.name == $name) | .browser_download_url')"

          if [ -z "${checksum_url}" ] || [ "${checksum_url}" = "null" ]; then
            echo "ERROR: ${new_tag} does not contain ${checksum_asset}"
            exit 1
          fi

          echo "Latest version: ${new_version}"
          echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"

          if [ "${current_version}" = "${new_version}" ] && [ "${aur_version}" = "${new_version}" ]; then
            echo "No update needed. Local and AUR versions match latest."
            echo "update_needed=false" >> "${GITHUB_OUTPUT}"
            echo "::endgroup::"
            exit 0
          fi

          if [ "${aur_resultcount}" = "0" ]; then
            echo "AUR package is missing. Publishing current version."
          elif [ "${aur_version}" != "${new_version}" ]; then
            echo "AUR version differs from latest. Publishing update."
          else
            echo "Local version differs from latest. Updating PKGBUILD."
          fi
          echo "update_needed=true" >> "${GITHUB_OUTPUT}"
          echo "::endgroup::"

          echo "::group::Generating PKGBUILD"
          appimage_sha="$(curl_json "${checksum_url}" | awk '{print $1}')"
          wrapper_sha="$(sha256sum pebble-bin.sh | awk '{print $1}')"
          desktop_sha="$(sha256sum pebble.desktop | awk '{print $1}')"
          icon_sha="$(curl_json "https://raw.githubusercontent.com/QingJ01/Pebble/v${new_pkgver}/src-tauri/icons/icon.png" | sha256sum | awk '{print $1}')"
          license_sha="$(curl_json "https://raw.githubusercontent.com/QingJ01/Pebble/v${new_pkgver}/LICENSE" | sha256sum | awk '{print $1}')"

          awk \
            -v pkgver="${new_pkgver}" \
            -v pkgrel="${new_pkgrel}" \
            -v appimage_sha="${appimage_sha}" \
            -v wrapper_sha="${wrapper_sha}" \
            -v desktop_sha="${desktop_sha}" \
            -v icon_sha="${icon_sha}" \
            -v license_sha="${license_sha}" \
            'BEGIN {OFS=""}
             /^pkgver=/ {print "pkgver=" pkgver; next}
             /^pkgrel=/ {print "pkgrel=" pkgrel; next}
             /^sha256sums\[0\]=/ {print "sha256sums[0]=" appimage_sha; next}
             /^sha256sums\[1\]=/ {print "sha256sums[1]=" wrapper_sha; next}
             /^sha256sums\[2\]=/ {print "sha256sums[2]=" desktop_sha; next}
             /^sha256sums\[3\]=/ {print "sha256sums[3]=" icon_sha; next}
             /^sha256sums\[4\]=/ {print "sha256sums[4]=" license_sha; next}
             {print}' PKGBUILD.sed > PKGBUILD

          grep -q "^pkgver=${new_pkgver}$" PKGBUILD
          grep -q "^sha256sums\\[0\\]=${appimage_sha}$" PKGBUILD

          echo "PKGBUILD generated and validated."
          echo "::endgroup::"

      - name: Notify if no update needed
        if: steps.check.outputs.update_needed == 'false'
        run: echo "No update needed. Stopping workflow."

      - name: Commit changes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add PKGBUILD
          git commit -m "Update PKGBUILD to version ${{ steps.check.outputs.new_version }}" || echo "No changes to commit"

          echo "Pushing changes to remote repository..."
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}

      - name: Check branch and continue or stop workflow
        if: steps.check.outputs.update_needed == 'true'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "On development branch, stopping before AUR publish."
            exit 0
          fi
          echo "On production branch, continuing to AUR publish."

      - name: Publish AUR package
        if: steps.check.outputs.update_needed == 'true' && github.ref != 'refs/heads/development'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: pebble-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.check.outputs.new_version }}"
          allow_empty_commits: false
          ssh_keyscan_types: rsa,ecdsa,ed25519
          assets: |
            pebble-bin.sh
            pebble.desktop

      - name: Summary
        run: |
          echo "::group::Workflow Summary"
          echo "Update needed: ${{ steps.check.outputs.update_needed }}"
          echo "New version: ${{ steps.check.outputs.new_version }}"
          if [ "${{ steps.check.outputs.update_needed }}" = "true" ]; then
            echo "PKGBUILD updated and published to AUR."
          else
            echo "No update needed."
          fi
          echo "::endgroup::"
